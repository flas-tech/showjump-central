name: Collect data & deploy

on:
  schedule:
    - cron: "0 */3 * * *"       # every 3 hours
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write        # commit refreshed data/all.json
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collector
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/collect.py

      - name: Commit refreshed data (if changed)
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "showjump-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/all.json
          git diff --cached --quiet || git commit -m "chore(data): refresh $(date -u +%Y-%m-%dT%H:%MZ)"
          git push || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
